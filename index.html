<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DPRK AIP — ChartFox Style Viewer</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600&family=Orbitron:wght@700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0b0e14;
    --sidebar: #12171f;
    --list-bg: #161c27;
    --border: #242d3c;
    --accent: #00d4ff;
    --text: #c8dde8;
    --muted: #5a7a8a;
  }

  body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--text); font-family: 'Rajdhani', sans-serif; overflow: hidden; }

  /* ── Layout ── */
  .app-container { display: flex; height: 100vh; flex-direction: column; }
  
  header {
    height: 50px; background: #060a0f; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; padding: 0 20px; justify-content: space-between; flex-shrink: 0;
  }
  .logo { font-family: 'Orbitron'; font-size: 0.9rem; color: var(--accent); letter-spacing: 2px; }

  .main-content { display: flex; flex: 1; overflow: hidden; }

  /* ── Sidebar (FIRs) ── */
  aside { width: 220px; background: var(--sidebar); border-right: 1px solid var(--border); overflow-y: auto; }
  .fir-item { padding: 12px 20px; cursor: pointer; border-bottom: 1px solid var(--border); font-size: 0.85rem; font-weight: 600; color: var(--muted); }
  .fir-item:hover { background: rgba(255,255,255,0.05); }
  .fir-item.active { color: var(--accent); background: rgba(0,212,255,0.05); border-left: 3px solid var(--accent); }

  /* ── List Area (Chart List) ── */
  .chart-list-panel { width: 300px; background: var(--list-bg); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
  .list-header { padding: 15px; font-size: 0.7rem; font-family: 'Share Tech Mono'; color: var(--muted); border-bottom: 1px solid var(--border); }
  .chart-items-container { flex: 1; overflow-y: auto; }
  .chart-item { 
    padding: 15px; border-bottom: 1px solid var(--border); cursor: pointer; transition: 0.2s;
    display: flex; flex-direction: column; gap: 5px;
  }
  .chart-item:hover { background: rgba(255,255,255,0.03); }
  .chart-item.active { background: #1a2332; border-right: 3px solid var(--accent); }
  .chart-label { font-size: 0.85rem; font-weight: 600; line-height: 1.3; }
  .chart-meta { font-size: 0.65rem; font-family: 'Share Tech Mono'; color: var(--muted); display: flex; gap: 8px; }
  .type-tag { padding: 2px 5px; border-radius: 3px; background: #242d3c; color: #fff; font-size: 0.55rem; }

  /* ── Viewer Area ── */
  .viewer-panel { flex: 1; background: #000; position: relative; display: flex; flex-direction: column; }
  iframe { width: 100%; height: 100%; border: none; }
  
  .viewer-placeholder {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    color: var(--muted); font-family: 'Share Tech Mono'; flex-direction: column; gap: 10px;
  }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-thumb { background: var(--border); }
</style>
</head>
<body>

<div class="app-container">
  <header>
    <div class="logo">DPRK AIP // CHARTS</div>
    <div style="font-family:'Share Tech Mono'; font-size:0.7rem; color: var(--muted)">AIRAC 2026 ONLINE</div>
  </header>

  <div class="main-content">
    <aside id="fir-list"></aside>

    <div class="chart-list-panel">
      <div class="list-header" id="list-title">SELECT A FIR</div>
      <div class="chart-items-container" id="chart-items"></div>
    </div>

    <div class="viewer-panel">
      <div class="viewer-placeholder" id="placeholder">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><circle cx="12" cy="12" r="10"/><path d="M12 8v8M8 12h8"/></svg>
        SELECT A CHART TO PREVIEW
      </div>
      <iframe id="pdf-viewer" src="about:blank" style="display: none;"></iframe>
    </div>
  </div>
</div>

<script>
const CHARTS = {
  ZKKP: [
    { file: 'ZKKP ENR.pdf', label: 'PYONGYANG ENROUTE RNAV', type: 'ENR' },
    { file: 'ZK ENROUTE RNAV - 시트1.pdf', label: 'ENROUTE RNAV - SHEET 1', type: 'ENR' },
    { file: 'ZK ENROUTE CONVENTIONAL - 시트1.p', label: 'ENROUTE CONVENTIONAL', type: 'ENR' }
  ],
  ZKPY: [
    { file: 'ZKPY-AD-CHART.pdf', label: 'AD CHART', type: 'AD' },
    { file: 'ZKPY-ACFT PARK_DOCKING-CHART.pdf', label: 'ACFT PARKING / DOCKING', type: 'GND' },
    { file: 'ZKPY-SID-CHART.pdf', label: 'STANDARD DEPARTURE (SID)', type: 'SID' },
    { file: 'ZKPY-STAR-CHART.pdf', label: 'STANDARD ARRIVAL (STAR)', type: 'STAR' },
    { file: 'ZKPY-ILS 35.pdf', label: 'ILS/DME RWY 35', type: 'APP' },
    { file: 'ZKPY-ILS DME 17.pdf', label: 'ILS/DME RWY 17', type: 'APP' },
    { file: 'ZKPY-RNP 35.pdf', label: 'RNP RWY 35', type: 'APP' },
    { file: 'ZKPY-RNP 17.pdf', label: 'RNP RWY 17', type: 'APP' }
  ],
  ZKWS: [
    { file: 'ZKWS-AD-CHART.pdf', label: 'AD CHART', type: 'AD' },
    { file: 'ZKWS-SID-CHART.pdf', label: 'STANDARD DEPARTURE (SID)', type: 'SID' },
    { file: 'ZKWS-STAR-CHART.pdf', label: 'STANDARD ARRIVAL (STAR)', type: 'STAR' },
    { file: 'ZKWS-APPROACH-ILS-CHART.pdf', label: 'ILS APPROACH', type: 'APP' }
  ]
};

const FIR_NAMES = { ZKKP: 'PYONGYANG FIR', ZKPY: 'SUNAN INTL', ZKWS: 'WONSAN KALMA' };

function init() {
  const firList = document.getElementById('fir-list');
  Object.keys(CHARTS).forEach(fir => {
    const div = document.createElement('div');
    div.className = 'fir-item';
    div.id = `fir-${fir}`;
    div.innerHTML = `<div style="font-size:0.6rem; opacity:0.6">${fir}</div>${FIR_NAMES[fir]}`;
    div.onclick = () => selectFIR(fir);
    firList.appendChild(div);
  });
  selectFIR('ZKPY'); // 預設開啟平壤
}

function selectFIR(fir) {
  document.querySelectorAll('.fir-item').forEach(el => el.classList.remove('active'));
  document.getElementById(`fir-${fir}`).classList.add('active');
  document.getElementById('list-title').textContent = `${fir} — ${CHARTS[fir].length} CHARTS`;
  
  const container = document.getElementById('chart-items');
  container.innerHTML = '';
  
  CHARTS[fir].forEach((chart, idx) => {
    const item = document.createElement('div');
    item.className = 'chart-item';
    item.id = `chart-${idx}`;
    item.innerHTML = `
      <div class="chart-meta"><span class="type-tag">${chart.type}</span> <span>${chart.file}</span></div>
      <div class="chart-label">${chart.label}</div>
    `;
    item.onclick = () => loadChart(chart, item);
    container.appendChild(item);
  });
}

function loadChart(chart, element) {
  document.querySelectorAll('.chart-item').forEach(el => el.classList.remove('active'));
  element.classList.add('active');
  
  const iframe = document.getElementById('pdf-viewer');
  const placeholder = document.getElementById('placeholder');
  
  placeholder.style.display = 'none';
  iframe.style.display = 'block';
  // 加上 #view=FitH 讓 PDF 自動符合寬度（直式閱讀優化）
  iframe.src = encodeURIComponent(chart.file) + '#view=FitH';
}

init();
</script>
</body>
</html>
